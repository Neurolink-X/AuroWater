<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Deep premium dark-blue bg -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030F1E"/>
      <stop offset="55%" stop-color="#051C34"/>
      <stop offset="100%" stop-color="#0A3255"/>
    </linearGradient>
    <!-- Left accent column -->
    <linearGradient id="accentCol" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </linearGradient>
    <!-- Big drop gradient -->
    <linearGradient id="bigDrop" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <!-- Drop inner glow -->
    <radialGradient id="dropInner" cx="38%" cy="28%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#7DD3FC" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0"/>
    </radialGradient>
    <!-- Tap metal gradient -->
    <linearGradient id="tapMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="40%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <!-- Button gradient -->
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <!-- Wave gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.0"/>
      <stop offset="30%" stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="glowDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tapGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid -->
  <pattern id="dotGrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#0EA5E9" opacity="0.07"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Left accent glow column -->
  <rect x="0" y="0" width="500" height="630" fill="url(#accentCol)"/>

  <!-- Decorative concentric rings (right) -->
  <circle cx="950" cy="315" r="420" fill="none" stroke="#0EA5E9" stroke-width="0.8" opacity="0.07"/>
  <circle cx="950" cy="315" r="310" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.1"/>
  <circle cx="950" cy="315" r="210" fill="none" stroke="#38BDF8" stroke-width="1.2" opacity="0.14"/>
  <circle cx="950" cy="315" r="120" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.2"/>

  <!-- Ambient glow blob behind drop -->
  <ellipse cx="960" cy="270" rx="180" ry="200" fill="#0EA5E9" opacity="0.08" filter="url(#glowDrop)"/>

  <!-- === BIG FAUCET / TAP ILLUSTRATION === -->
  <!-- Pipe horizontal -->
  <rect x="720" y="195" width="210" height="46" rx="23" fill="url(#tapMetal)" filter="url(#tapGlow)"/>
  <!-- Pipe shine -->
  <rect x="730" y="200" width="185" height="14" rx="7" fill="white" opacity="0.3"/>
  <!-- Spout neck going down -->
  <rect x="872" y="225" width="46" height="80" rx="23" fill="url(#tapMetal)" filter="url(#tapGlow)"/>
  <rect x="880" y="228" width="20" height="60" rx="10" fill="white" opacity="0.22"/>
  <!-- Spout opening / nozzle -->
  <rect x="860" y="298" width="70" height="18" rx="9" fill="url(#tapMetal)"/>
  <!-- Handle vertical pole -->
  <rect x="750" y="158" width="22" height="46" rx="11" fill="url(#tapMetal)" filter="url(#tapGlow)"/>
  <!-- Handle crossbar -->
  <rect x="720" y="152" width="82" height="22" rx="11" fill="url(#tapMetal)" filter="url(#tapGlow)"/>
  <rect x="725" y="154" width="70" height="10" rx="5" fill="white" opacity="0.28"/>

  <!-- === WATER DROP (falling from spout) === -->
  <path d="M895 335 C895 335, 840 415, 840 465 A55 55 0 0 0 950 465 C950 415, 895 335, 895 335Z"
        fill="url(#bigDrop)" filter="url(#glowDrop)" opacity="0.95"/>
  <!-- Drop inner light -->
  <path d="M895 335 C895 335, 840 415, 840 465 A55 55 0 0 0 950 465 C950 415, 895 335, 895 335Z"
        fill="url(#dropInner)"/>
  <!-- Tiny drop streak above -->
  <ellipse cx="895" cy="328" rx="6" ry="12" fill="#7DD3FC" opacity="0.6"/>
  <ellipse cx="895" cy="316" rx="3.5" ry="7" fill="#BAE6FD" opacity="0.4"/>

  <!-- Water splash dots at bottom -->
  <circle cx="840" cy="520" r="7" fill="#38BDF8" opacity="0.25"/>
  <circle cx="870" cy="530" r="4" fill="#38BDF8" opacity="0.18"/>
  <circle cx="930" cy="528" r="5" fill="#38BDF8" opacity="0.2"/>
  <circle cx="960" cy="515" r="8" fill="#38BDF8" opacity="0.15"/>

  <!-- Wave line bottom -->
  <path d="M600 565 Q700 548 800 565 Q900 582 1000 565 Q1100 548 1200 565 L1200 630 L600 630Z" fill="url(#waveGrad)"/>
  <path d="M0 580 Q100 563 200 580 Q300 597 400 578 Q500 560 600 580 L600 630 L0 630Z" fill="url(#waveGrad)" opacity="0.6"/>

  <!-- ======= LEFT TEXT BLOCK ======= -->
  <!-- Eyebrow label -->
  <rect x="80" y="115" width="160" height="28" rx="14" fill="#0EA5E9" opacity="0.18"/>
  <text x="160" y="134" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#38BDF8" text-anchor="middle" letter-spacing="3" font-weight="600">INDIA'S #1 TAP SERVICE</text>

  <!-- Main brand name - massive impact -->
  <text x="80" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="108" font-weight="700" fill="#ffffff" letter-spacing="-3" filter="url(#textGlow)" opacity="0.15">AuroTap</text>
  <text x="80" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="108" font-weight="700" fill="#ffffff" letter-spacing="-3">AuroTap</text>

  <!-- Tagline -->
  <text x="80" y="272" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#7DD3FC" letter-spacing="1" font-style="italic">Pure water, expert hands — at your door.</text>

  <!-- Thin divider line -->
  <rect x="80" y="295" width="440" height="1.5" rx="1" fill="#0EA5E9" opacity="0.4"/>

  <!-- Feature icons row -->
  <!-- Feature 1 -->
  <circle cx="106" cy="340" r="22" fill="#0EA5E9" opacity="0.15"/>
  <text x="106" y="347" text-anchor="middle" font-size="20">💧</text>
  <text x="136" y="337" font-family="Georgia, serif" font-size="15" fill="#E0F2FE" font-weight="700">Water Delivery</text>
  <text x="136" y="356" font-family="Georgia, serif" font-size="13" fill="#7DD3FC" opacity="0.8">Same-day, doorstep</text>

  <!-- Feature 2 -->
  <circle cx="106" cy="400" r="22" fill="#0EA5E9" opacity="0.15"/>
  <text x="106" y="407" text-anchor="middle" font-size="20">🔧</text>
  <text x="136" y="397" font-family="Georgia, serif" font-size="15" fill="#E0F2FE" font-weight="700">Book a Plumber</text>
  <text x="136" y="416" font-family="Georgia, serif" font-size="13" fill="#7DD3FC" opacity="0.8">Verified experts, 60-min arrival</text>

  <!-- Feature 3 -->
  <circle cx="106" cy="460" r="22" fill="#0EA5E9" opacity="0.15"/>
  <text x="106" y="467" text-anchor="middle" font-size="20">⚡</text>
  <text x="136" y="457" font-family="Georgia, serif" font-size="15" fill="#E0F2FE" font-weight="700">Instant Booking</text>
  <text x="136" y="476" font-family="Georgia, serif" font-size="13" fill="#7DD3FC" opacity="0.8">App · Web · WhatsApp</text>

  <!-- CTA Button -->
  <rect x="80" y="506" width="220" height="56" rx="28" fill="url(#btnGrad)"/>
  <!-- Button shine -->
  <rect x="82" y="508" width="216" height="26" rx="26" fill="white" opacity="0.12"/>
  <text x="190" y="541" font-family="Georgia, serif" font-size="19" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">Book Now  →</text>

  <!-- Secondary CTA outline -->
  <rect x="316" y="506" width="180" height="56" rx="28" fill="none" stroke="#0EA5E9" stroke-width="1.8"/>
  <text x="406" y="541" font-family="Georgia, serif" font-size="17" fill="#38BDF8" text-anchor="middle">Learn More</text>

  <!-- Website URL bottom -->
  <text x="80" y="608" font-family="Georgia, serif" font-size="14" fill="#38BDF8" opacity="0.55" letter-spacing="3">WWW.AUROTAP.IN</text>

  <!-- Rating badge -->
  <rect x="82" y="615" width="0" height="0" rx="0"/>
  <text x="80" y="625" font-family="Georgia, serif" font-size="12" fill="#7DD3FC" opacity="0.4" letter-spacing="2">★★★★★  TRUSTED BY 10,000+ CUSTOMERS</text>
</svg>
